# ============================================================
# Data Quality Rules — Stage 2+
# Read by pipeline/transform.py (flags + normalisation) and
# pipeline/dq_report.py / scorer (handling_action consistency).
# ============================================================

currency:
  canonical: ZAR
  normalise_map:
    ZAR: ZAR
    zar: ZAR
    R: ZAR
    r: ZAR
    RANDS: ZAR
    rands: ZAR
    "710": ZAR

transactions:
  # Empty keeps Stage 1 behaviour (no transaction NULL_REQUIRED flags).
  required_non_null: []
  transaction_type_allowed:
    - DEBIT
    - CREDIT
    - FEE
    - REVERSAL
  channel_allowed:
    - POS
    - APP
    - ATM
    - EFT
    - USSD
    - INTERNAL
  # When true: Spark typeof(_amount_raw)=="string" with successful decimal cast → TYPE_MISMATCH.
  # Leave false if Spark widens JSON amount to string for every row (would flag ~100%).
  flag_string_amount_type_mismatch: false

dq_report:
  issues:
    duplicate_transactions:
      handling_action: DEDUPLICATED_KEEP_FIRST
    orphaned_transactions:
      handling_action: QUARANTINED
    amount_type_mismatch:
      handling_action: CAST_TO_DECIMAL
    date_format_inconsistency:
      handling_action: NORMALISED_DATE
    currency_variants:
      handling_action: NORMALISED_CURRENCY
    null_account_id:
      handling_action: EXCLUDED_NULL_PK

# Issue catalogue — detection / handling narrative for scorer maintainability checks.
issue_catalog:
  DUPLICATE_DEDUPED:
    detection: Window partitionBy(transaction_id) count on Bronze; dq_flag when count > 1 on retained row (latest ingestion_timestamp).
    handling_action: DEDUPLICATED_KEEP_FIRST
    dq_report_issue_key: duplicate_transactions
  ORPHANED_ACCOUNT:
    detection: transaction account_id not present in Silver accounts (customer-valid inner join envelope).
    handling_action: QUARANTINED
    dq_report_issue_key: orphaned_transactions
  TYPE_MISMATCH:
    detection: Amount decimal cast fails; OR (optional flag_string_amount_type_mismatch) Spark typeof(amount) is string while cast succeeds; OR transaction_type/channel outside allowed lists (dq_rules.transactions).
    handling_action: CAST_TO_DECIMAL
    dq_report_issue_key: amount_type_mismatch
  DATE_FORMAT:
    detection: Non-empty transaction_date raw string but multi-format parser yields null date.
    handling_action: NORMALISED_DATE
    dq_report_issue_key: date_format_inconsistency
  CURRENCY_VARIANT:
    detection: Trimmed source currency not literally "ZAR" (variants mapped via normalise_map).
    handling_action: NORMALISED_CURRENCY
    dq_report_issue_key: currency_variants
  NULL_REQUIRED:
    detection: accounts.csv rows with null or blank account_id excluded before Silver accounts.
    handling_action: EXCLUDED_NULL_PK
    dq_report_issue_key: null_account_id
