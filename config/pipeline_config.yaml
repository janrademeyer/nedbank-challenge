# ============================================================
# Pipeline Configuration
#
# pipeline_stage: "1" skips dq_report; "2" batch only; "3" batch + stream_gold + dq_report includes stream time.
pipeline_stage: "3"

#
# All paths are absolute paths inside the Docker container.
# Do NOT change the /data/input/ or /data/output/ prefixes —
# these are fixed mount points enforced by the scoring system.
#
# The scoring system may inject this file at /data/config/pipeline_config.yaml
# at runtime. Your pipeline should read from that path at startup, not from
# a copy baked into your image.
#
# Recommended loading pattern (Python):
#   import yaml, os
#   config_path = os.environ.get("PIPELINE_CONFIG", "/data/config/pipeline_config.yaml")
#   with open(config_path) as f:
#       config = yaml.safe_load(f)
# ============================================================

# ── Input paths (read-only; do not write here) ────────────────
input:
  accounts_path: /data/input/accounts.csv
  transactions_path: /data/input/transactions.jsonl
  customers_path: /data/input/customers.csv

# ── Output paths (your pipeline creates these at runtime) ────
output:
  bronze_path: /data/output/bronze
  silver_path: /data/output/silver
  gold_path: /data/output/gold
  dq_report_path: /data/output/dq_report.json   # Stage 2+ only

# ── Stage 3 streaming (active when pipeline_stage: "3") ───────
# poll_interval_seconds: sleep between directory scans (stream_interface_spec §3).
# quiesce_timeout_seconds: cumulative idle when no new stream_*.jsonl files — exit poll loop (not the per-row 300s SLA).
streaming:
  stream_input_path: /data/stream
  stream_gold_path: /data/output/stream_gold
  poll_interval_seconds: 10
  quiesce_timeout_seconds: 60
  # Writable at runtime (Docker --read-only allows /tmp tmpfs per submission_guide).
  processed_state_path: /tmp/stream_processed_files.txt

# ── Spark settings ────────────────────────────────────────────
# Keep master as local[2] to match the 2-vCPU scoring constraint.
# Do not set to local[*] — it will try to use all available CPUs.
spark:
  master: local[2]
  app_name: nedbank-de-pipeline
  shuffle_partitions: 4
  # Optional override; if omitted, helper.py still uses /data/output/_spark_tmp (writable mount).
  local_dir: /data/output/_spark_tmp
  # snappy is faster / lighter CPU than gzip; needs JNI temp on a writable dir (local_dir above).
  parquet_compression: snappy

# ── Silver casting / dedupe (extend without code changes where possible) ──
silver:
  dedupe_order_column: ingestion_timestamp
  casting:
    customers:
      date_columns: [dob]
      integer_columns: [risk_score]
    accounts:
      date_columns: [open_date, last_activity_date]
      decimal_columns: [credit_limit, current_balance]
    transactions:
      date_columns: [transaction_date]
      decimal_columns: [amount]

# ── DQ rules (Stage 1 reads defaults; Stage 2+ expands dq_report.json etc.)
dq:
  rules_path: /data/config/dq_rules.yaml
